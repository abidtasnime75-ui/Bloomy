name: serre_connectee_app
description: Application Bloomy - Gestion de serre connectée IoT
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ✅ Icônes
  cupertino_icons: ^1.0.8
  
  # ✅ Firebase - SEULEMENT Firestore (pas Auth)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  
  # ✅ Local Storage (pour auth locale)
  shared_preferences: ^2.2.2
  
  # ✅ State Management & Utils
  provider: ^6.1.1
  fl_chart: ^0.65.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_bloomy.png